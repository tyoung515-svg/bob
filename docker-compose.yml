# All infrastructure ports are bound to 127.0.0.1 (loopback) so nothing is
# reachable from another host on the network. BoB's own services (core, gateway,
# pipeline) run as host processes and connect over loopback; they are NOT in this
# compose file. POSTGRES_PASSWORD is read from the environment (the setup flow
# generates a strong value into .secrets/bobclaw.env) and falls back to a weak
# dev default only when unset. See SECURITY.md.
#
# The project name is pinned (not derived from the checkout directory) so a
# re-cloned or renamed checkout keeps its containers and volumes. Running TWO
# installs on one host (e.g. a dev tree and a pinned prod tree) requires a
# distinct COMPOSE_PROJECT_NAME per install — see UPGRADE.md. Container names
# derive from the project (bobclaw-postgres-1 etc.); scripts address services
# through `docker compose exec`, never fixed names.
name: ${COMPOSE_PROJECT_NAME:-bobclaw}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    # Host ports are env-parameterized (defaults unchanged) so a second install
    # on the same machine can pick free ports — pair with COMPOSE_PROJECT_NAME
    # and matching *_URL values in .secrets/bobclaw.env. See UPGRADE.md.
    ports:
      - "127.0.0.1:${BOBCLAW_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: bobclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bobclaw}
      POSTGRES_DB: bobclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bobclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - DISPLAY=:99
    volumes:
      - ./downloads:/downloads
    profiles:
      - full  # Only start with: docker-compose --profile full up

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BOBCLAW_REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 6

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    # Host ports 6353/6354 (not the Qdrant default 6333/6334) so this instance
    # doesn't collide with any other Qdrant you may already run on 6333. Set
    # MEMORY_QDRANT_URL=http://127.0.0.1:6353 to point BoB at it.
    ports:
      - "127.0.0.1:${BOBCLAW_QDRANT_PORT:-6353}:6333"
      - "127.0.0.1:${BOBCLAW_QDRANT_GRPC_PORT:-6354}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The qdrant image ships no wget/curl/nc, but DOES ship bash. Probe /healthz
      # over bash's /dev/tcp (dash lacks it, so invoke bash explicitly, not CMD-SHELL).
      # Match " 200 " on the STATUS LINE only (head -n1) so a body can't false-pass.
      test: ["CMD", "bash", "-c", 'exec 3<>/dev/tcp/localhost/6333 && printf "GET /healthz HTTP/1.0\r\n\r\n" >&3 && head -n1 <&3 | grep -q " 200 "']
      interval: 5s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  qdrant_data:
